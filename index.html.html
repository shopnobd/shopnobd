<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopnoBD — জেনারেল স্টোর</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161820;
  --surface2: #1e2028;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #00d084;
  --accent-dim: rgba(0,208,132,0.12);
  --accent-glow: rgba(0,208,132,0.25);
  --text: #f0f2f7;
  --text2: #8b8fa8;
  --text3: #555870;
  --red: #ff4d6d;
  --red-dim: rgba(255,77,109,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --blue: #4f8ef7;
  --blue-dim: rgba(79,142,247,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Hind Siliguri', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ===== TOPBAR ===== */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,15,20,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px; height: 60px;
}
.logo {
  font-family: 'Tiro Bangla', serif;
  font-size: 22px; font-weight: 400;
  color: var(--text); letter-spacing: -0.3px;
  text-decoration: none;
}
.logo span { color: var(--accent); }
.topbar-search {
  flex: 1; max-width: 480px;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 30px; padding: 0 16px; height: 38px;
  transition: border-color .2s;
}
.topbar-search:focus-within { border-color: var(--accent); }
.topbar-search svg { color: var(--text3); flex-shrink: 0; }
.topbar-search input {
  background: none; border: none; outline: none;
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 14px; color: var(--text); width: 100%;
}
.topbar-search input::placeholder { color: var(--text3); }
.topbar-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.tab-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-family: 'Hind Siliguri', sans-serif;
  font-size: 14px; padding: 6px 14px; border-radius: 30px;
  transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active { background: var(--accent-dim); color: var(--accent); }
.cart-btn {
  background: var(--accent); color: #000;
  border: none; cursor: pointer;
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 14px; font-weight: 600;
  padding: 7px 16px; border-radius: 30px;
  display: flex; align-items: center; gap: 8px;
  transition: all .2s; position: relative;
}
.cart-btn:hover { background: #00e894; transform: translateY(-1px); }
.cart-badge {
  background: #000; color: var(--accent);
  font-size: 11px; font-weight: 700;
  border-radius: 50%; width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  min-width: 18px;
}

/* ===== PAGES ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== SHOP PAGE ===== */
.shop-layout { display: flex; min-height: calc(100vh - 60px); }

.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky; top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.sidebar-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); padding: 0 20px 10px;
}
.cat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer;
  color: var(--text2); font-size: 14px;
  transition: all .15s; border-left: 3px solid transparent;
  user-select: none;
}
.cat-item:hover { background: var(--surface2); color: var(--text); }
.cat-item.active {
  background: var(--accent-dim); color: var(--accent);
  border-left-color: var(--accent); font-weight: 600;
}
.cat-item .cat-icon { font-size: 18px; width: 24px; text-align: center; }
.cat-count {
  margin-left: auto; font-size: 11px;
  background: var(--surface2); color: var(--text3);
  padding: 2px 7px; border-radius: 30px;
}
.cat-item.active .cat-count { background: var(--accent-glow); color: var(--accent); }

.shop-main { flex: 1; padding: 24px; }

.sort-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.sort-bar span { font-size: 13px; color: var(--text3); }
.sort-select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-sm);
  padding: 6px 12px; font-family: 'Hind Siliguri', sans-serif;
  font-size: 13px; cursor: pointer; outline: none;
}
.product-count { margin-left: auto; font-size: 13px; color: var(--text3); }

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 16px;
}
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer;
  transition: all .2s; position: relative;
}
.product-card:hover {
  border-color: var(--border2);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}
.product-img {
  width: 100%; height: 140px;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px;
  background: var(--surface2);
  position: relative;
}
.product-badge {
  position: absolute; top: 10px; left: 10px;
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; letter-spacing: .05em; text-transform: uppercase;
}
.badge-new { background: var(--accent-dim); color: var(--accent); }
.badge-hot { background: var(--red-dim); color: var(--red); }
.product-body { padding: 14px; }
.product-cat { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
.product-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
.product-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.product-price { font-size: 17px; font-weight: 700; color: var(--accent); }
.product-stock { font-size: 11px; color: var(--text3); }
.add-to-cart-btn {
  background: var(--accent); color: #000;
  border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 18px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.add-to-cart-btn:hover { background: #00e894; transform: scale(1.1); }

/* ===== CART DRAWER ===== */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300; display: none;
  backdrop-filter: blur(4px);
}
.overlay.open { display: block; }
.cart-drawer {
  position: fixed; top: 0; right: -420px; width: 420px;
  height: 100%; background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 400; display: flex; flex-direction: column;
  transition: right .3s cubic-bezier(.4,0,.2,1);
}
.cart-drawer.open { right: 0; }
.drawer-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-title { font-size: 17px; font-weight: 600; }
.drawer-close {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; width: 32px; height: 32px;
  border-radius: 50%; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.drawer-close:hover { color: var(--text); border-color: var(--border2); }
.cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
.cart-empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3);
}
.cart-empty-icon { font-size: 56px; margin-bottom: 12px; display: block; }
.cart-empty p { font-size: 16px; margin-bottom: 6px; color: var(--text2); }
.cart-empty small { font-size: 13px; }
.cart-item {
  display: flex; gap: 14px; padding: 14px 0;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.cart-item-icon {
  font-size: 32px; width: 52px; height: 52px;
  background: var(--surface2); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.cart-item-price { font-size: 13px; color: var(--text3); }
.cart-item-subtotal { font-size: 15px; font-weight: 700; color: var(--accent); margin-top: 6px; }
.qty-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.qty-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); cursor: pointer;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-num { font-size: 15px; font-weight: 600; min-width: 20px; text-align: center; }
.remove-btn {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; padding: 4px;
  transition: color .15s;
}
.remove-btn:hover { color: var(--red); }

.cart-footer {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
}
.cart-summary-row {
  display: flex; justify-content: space-between;
  font-size: 14px; margin-bottom: 8px; color: var(--text2);
}
.cart-summary-row.total {
  font-size: 17px; font-weight: 700;
  color: var(--text); margin: 12px 0;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.cart-summary-row.total span:last-child { color: var(--accent); }
.free-badge {
  background: var(--accent-dim); color: var(--accent);
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
}
.checkout-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #000;
  border: none; cursor: pointer;
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 15px; font-weight: 700;
  border-radius: var(--radius); transition: all .2s;
}
.checkout-btn:hover { background: #00e894; transform: translateY(-1px); }
.checkout-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.free-delivery-note {
  text-align: center; font-size: 12px;
  color: var(--text3); margin-top: 10px;
}

/* ===== ORDERS PAGE ===== */
.page-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.page-header h1 { font-size: 22px; font-weight: 700; }
.page-header p { font-size: 14px; color: var(--text3); margin-top: 3px; }
.orders-list { padding: 24px 28px; }
.order-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px; overflow: hidden;
}
.order-header {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 12px;
}
.order-id { font-size: 13px; font-weight: 700; color: var(--accent); }
.order-date { font-size: 13px; color: var(--text3); }
.order-status {
  margin-left: auto; font-size: 12px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .05em;
}
.status-delivered { background: var(--accent-dim); color: var(--accent); }
.status-processing { background: var(--amber-dim); color: var(--amber); }
.status-shipped { background: var(--blue-dim); color: var(--blue); }
.status-cancelled { background: var(--red-dim); color: var(--red); }
.order-items { padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 10px; }
.order-item-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 7px 12px; font-size: 13px;
}
.order-footer {
  padding: 12px 20px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.order-total { font-size: 15px; font-weight: 700; }
.order-total span { color: var(--accent); }
.reorder-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; padding: 7px 16px;
  border-radius: var(--radius-sm); font-family: 'Hind Siliguri', sans-serif;
  font-size: 13px; transition: all .15s;
}
.reorder-btn:hover { border-color: var(--accent); color: var(--accent); }
.no-orders {
  text-align: center; padding: 80px 20px;
  color: var(--text3);
}
.no-orders-icon { font-size: 64px; display: block; margin-bottom: 16px; }
.no-orders p { font-size: 16px; color: var(--text2); margin-bottom: 6px; }

/* ===== ADMIN PAGE ===== */
.admin-layout { display: flex; min-height: calc(100vh - 60px); }
.admin-sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
}
.admin-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 20px; cursor: pointer;
  color: var(--text2); font-size: 14px;
  transition: all .15s; border-left: 3px solid transparent;
}
.admin-nav-item:hover { background: var(--surface2); color: var(--text); }
.admin-nav-item.active {
  background: var(--purple-dim); color: var(--purple);
  border-left-color: var(--purple); font-weight: 600;
}
.admin-main { flex: 1; padding: 28px; overflow-y: auto; }

/* Stats cards */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; right: 0; width: 80px; height: 80px;
  border-radius: 50%; opacity: .06;
}
.stat-card.green::before { background: var(--accent); }
.stat-card.amber::before { background: var(--amber); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.purple::before { background: var(--purple); }
.stat-icon { font-size: 24px; margin-bottom: 12px; }
.stat-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; }
.stat-card.green .stat-value { color: var(--accent); }
.stat-card.amber .stat-value { color: var(--amber); }
.stat-card.blue .stat-value { color: var(--blue); }
.stat-card.purple .stat-value { color: var(--purple); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

.admin-section-title {
  font-size: 16px; font-weight: 700;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}

/* Add product form */
.add-product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px;
  margin-bottom: 28px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: .05em; text-transform: uppercase; }
.form-input, .form-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 14px; outline: none; transition: border-color .2s;
  width: 100%;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.form-actions { display: flex; gap: 12px; margin-top: 20px; }
.btn-primary {
  background: var(--accent); color: #000;
  border: none; cursor: pointer; padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 14px; font-weight: 700; transition: all .2s;
}
.btn-primary:hover { background: #00e894; }
.btn-secondary {
  background: none; border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 14px; transition: all .15s;
}
.btn-secondary:hover { border-color: var(--border2); color: var(--text); }

/* Product table */
.product-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.product-table table { width: 100%; border-collapse: collapse; }
.product-table thead th {
  background: var(--surface2); padding: 12px 16px;
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .06em;
  text-align: left; border-bottom: 1px solid var(--border);
}
.product-table tbody td {
  padding: 14px 16px; font-size: 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.product-table tbody tr:last-child td { border-bottom: none; }
.product-table tbody tr:hover td { background: var(--surface2); }
.table-icon { font-size: 24px; }
.table-name { font-weight: 600; }
.table-cat {
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; background: var(--surface2); color: var(--text3);
}
.table-price { font-weight: 700; color: var(--accent); }
.table-stock { color: var(--text2); }
.table-actions { display: flex; gap: 6px; }
.tbl-btn {
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; padding: 5px 12px; border-radius: var(--radius-sm);
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 12px; color: var(--text2); transition: all .15s;
}
.tbl-btn:hover { border-color: var(--border2); color: var(--text); }
.tbl-btn.delete:hover { border-color: var(--red); color: var(--red); }

/* Orders admin table */
.orders-admin-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  margin-top: 8px;
}
.orders-admin-table table { width: 100%; border-collapse: collapse; }
.orders-admin-table thead th {
  background: var(--surface2); padding: 12px 16px;
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .06em;
  text-align: left; border-bottom: 1px solid var(--border);
}
.orders-admin-table tbody td {
  padding: 14px 16px; font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.orders-admin-table tbody tr:last-child td { border-bottom: none; }
.orders-admin-table tbody tr:hover td { background: rgba(255,255,255,.02); }

/* Admin sub-tabs */
.admin-subtabs { display: flex; gap: 6px; margin-bottom: 20px; }
.subtab-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 13px; transition: all .15s;
}
.subtab-btn:hover { border-color: var(--border2); color: var(--text); }
.subtab-btn.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); font-weight: 600; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text); padding: 12px 22px;
  border-radius: 30px; font-size: 14px; font-weight: 500;
  z-index: 999; display: flex; align-items: center; gap: 10px;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.toast-dot.red { background: var(--red); }
.toast-dot.amber { background: var(--amber); }

/* ===== MISC ===== */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--text3);
  grid-column: 1/-1;
}
.empty-state p { font-size: 16px; color: var(--text2); margin-bottom: 6px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>

      <div class="admin-nav-item" id="anav-orders" onclick="showAdminTab('orders')">🛒 অর্ডার পরিচালনা</div>

</div>

<script>
// ===== DATA =====
let products = [
  {id:1, name:"কটন শার্ট", price:850, cat:"পোশাক", icon:"👔", stock:20, badge:"new"},
  {id:2, name:"লেডিস কুর্তা", price:1200, cat:"পোশাক", icon:"👗", stock:15, badge:"hot"},
  {id:3, name:"স্পোর্টস শু", price:2500, cat:"পোশাক", icon:"👟", stock:10, badge:""},
  {id:4, name:"ব্লেজার জ্যাকেট", price:3800, cat:"পোশাক", icon:"🧥", stock:6, badge:"new"},
  {id:5, name:"স্মার্টফোন প্রো", price:28000, cat:"ইলেকট্রনিক্স", icon:"📱", stock:8, badge:"hot"},
  {id:6, name:"ওয়্যারলেস হেডফোন", price:4500, cat:"ইলেকট্রনিক্স", icon:"🎧", stock:12, badge:""},
  {id:7, name:"ল্যাপটপ ব্যাগ", price:1500, cat:"ইলেকট্রনিক্স", icon:"💼", stock:18, badge:""},
  {id:8, name:"স্মার্টওয়াচ", price:9500, cat:"ইলেকট্রনিক্স", icon:"⌚", stock:7, badge:"new"},
  {id:9, name:"আম (১ কেজি)", price:120, cat:"খাবার", icon:"🥭", stock:50, badge:""},
  {id:10, name:"বাসমতী চাল (৫ কেজি)", price:580, cat:"খাবার", icon:"🍚", stock:30, badge:""},
  {id:11, name:"চকোলেট গিফট বক্স", price:350, cat:"খাবার", icon:"🍫", stock:40, badge:"hot"},
  {id:12, name:"অর্গানিক মধু", price:480, cat:"খাবার", icon:"🍯", stock:25, badge:"new"},
  {id:13, name:"মোমবাতি সেট", price:280, cat:"গৃহস্থালি", icon:"🕯️", stock:35, badge:""},
  {id:14, name:"সুগন্ধি লোশন", price:220, cat:"গৃহস্থালি", icon:"🧴", stock:42, badge:""},
  {id:15, name:"কুশন সেট", price:950, cat:"গৃহস্থালি", icon:"🛋️", stock:14, badge:""},
  {id:16, name:"ফুলের তোড়া", price:450, cat:"উপহার", icon:"💐", stock:20, badge:"hot"},
  {id:17, name:"গিফট হ্যাম্পার", price:1800, cat:"উপহার", icon:"🎁", stock:10, badge:"new"},
  {id:18, name:"পার্টি ব্যালুন সেট", price:150, cat:"উপহার", icon:"🎈", stock:60, badge:""},
];

let cart = {};
let orders = [
  {
    id: "ORD-2024-001", date: "১৫ মার্চ, ২০২৪",
    status: "delivered",
    items: [{icon:"👔", name:"কটন শার্ট", qty:2}, {icon:"👗", name:"লেডিস কুর্তা", qty:1}],
    total: 2900
  },
  {
    id: "ORD-2024-002", date: "২২ মার্চ, ২০২৪",
    status: "processing",
    items: [{icon:"📱", name:"স্মার্টফোন প্রো", qty:1}],
    total: 28060
  },
  {
    id: "ORD-2024-003", date: "২৫ মার্চ, ২০২৪",
    status: "shipped",
    items: [{icon:"🎧", name:"ওয়্যারলেস হেডফোন", qty:1}, {icon:"🍫", name:"চকোলেট গিফট বক্স", qty:3}],
    total: 5610
  }
];

let activeCategory = "সব";
let nextId = 19;
let adminTab = "dashboard";

// ===== CATEGORIES =====
function getCategories() {
  const cats = [...new Set(products.map(p => p.cat))];
  return ["সব", ...cats];
}

function renderCategoryList() {
  const catIcons = {
    "সব":"🏪","পোশাক":"👔","ইলেকট্রনিক্স":"📱",
    "খাবার":"🍎","গৃহস্থালি":"🏠","উপহার":"🎁","অন্যান্য":"📦"
  };
  const el = document.getElementById("category-list");
  const cats = getCategories();
  el.innerHTML = cats.map(c => {
    const count = c === "সব" ? products.length : products.filter(p => p.cat === c).length;
    return `<div class="cat-item${c===activeCategory?" active":""}" onclick="setCategory('${c}')">
      <span class="cat-icon">${catIcons[c]||"📦"}</span>
      <span>${c}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join("");
}

function setCategory(c) {
  activeCategory = c;
  renderCategoryList();
  filterProducts();
}

// ===== PRODUCTS =====
function filterProducts() {
  const q = document.getElementById("global-search").value.toLowerCase();
  const sort = document.getElementById("sort-select").value;
  let list = products.filter(p => {
    const matchCat = activeCategory === "সব" || p.cat === activeCategory;
    const matchQ = p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  if (sort === "price-asc") list.sort((a,b) => a.price - b.price);
  else if (sort === "price-desc") list.sort((a,b) => b.price - a.price);
  else if (sort === "name") list.sort((a,b) => a.name.localeCompare(b.name, "bn"));
  renderProductGrid(list);
  document.getElementById("product-count").textContent = list.length + "টি পণ্য";
}

function renderProductGrid(list) {
  const grid = document.getElementById("products-grid");
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>কোনো পণ্য পাওয়া যায়নি</p><small>অন্য কীওয়ার্ড দিয়ে চেষ্টা করুন</small></div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const badgeHtml = p.badge === "new"
      ? '<span class="product-badge badge-new">নতুন</span>'
      : p.badge === "hot" ? '<span class="product-badge badge-hot">🔥 হট</span>' : "";
    return `<div class="product-card">
      <div class="product-img">
        ${p.icon}
        ${badgeHtml}
      </div>
      <div class="product-body">
        <div class="product-cat">${p.cat}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-bottom">
          <div>
            <div class="product-price">৳${p.price.toLocaleString()}</div>
            <div class="product-stock">${p.stock > 5 ? "স্টকে আছে" : p.stock > 0 ? "⚠️ কম বাকি" : "আউট অফ স্টক"}</div>
          </div>
          <button class="add-to-cart-btn" onclick="addToCart(${p.id})" ${p.stock===0?"disabled":""}>+</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ===== CART =====
function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (!p || p.stock === 0) return;
  cart[id] = (cart[id] || 0) + 1;
  updateCartBadge();
  showToast(`${p.icon} ${p.name} কার্টে যোগ হয়েছে`, "green");
}

function updateCartBadge() {
  const total = Object.values(cart).reduce((s,i) => s+i, 0);
  document.getElementById("cart-badge").textContent = total;
}

function renderCartDrawer() {
  const entries = Object.entries(cart).filter(([,q]) => q > 0);
  const itemsEl = document.getElementById("cart-items");
  const footerEl = document.getElementById("cart-footer");
  if (entries.length === 0) {
    itemsEl.innerHTML = `<div class="cart-empty">
      <span class="cart-empty-icon">🛒</span>
      <p>কার্ট খালি আছে</p>
      <small>পণ্য যোগ করে শপিং শুরু করুন</small>
    </div>`;
    footerEl.innerHTML = "";
    return;
  }
  itemsEl.innerHTML = entries.map(([id, qty]) => {
    const p = products.find(x => x.id == id);
    if (!p) return "";
    return `<div class="cart-item">
      <div class="cart-item-icon">${p.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">৳${p.price.toLocaleString()} × ${qty}</div>
        <div class="cart-item-subtotal">৳${(p.price * qty).toLocaleString()}</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
          <button class="remove-btn" onclick="removeFromCart(${id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join("");
  const subtotal = entries.reduce((s,[id,qty]) => {
    const p = products.find(x => x.id == id);
    return s + (p ? p.price * qty : 0);
  }, 0);
  const delivery = subtotal >= 2000 ? 0 : 60;
  const total = subtotal + delivery;
  footerEl.innerHTML = `
    <div class="cart-summary-row"><span>সাবটোটাল</span><span>৳${subtotal.toLocaleString()}</span></div>
    <div class="cart-summary-row"><span>ডেলিভারি চার্জ</span><span>${delivery === 0 ? '<span class="free-badge">ফ্রি</span>' : '৳' + delivery}</span></div>
    <div class="cart-summary-row total"><span>মোট পরিমাণ</span><span>৳${total.toLocaleString()}</span></div>
    <button class="checkout-btn" onclick="checkout()">অর্ডার নিশ্চিত করুন →</button>
    ${delivery > 0 ? `<p class="free-delivery-note">৳${(2000-subtotal).toLocaleString()} বেশি কিনলে ফ্রি ডেলিভারি!</p>` : '<p class="free-delivery-note">🎉 আপনি ফ্রি ডেলিভারি পাচ্ছেন!</p>'}
  `;
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartBadge();
  renderCartDrawer();
}
function removeFromCart(id) {
  delete cart[id];
  updateCartBadge();
  renderCartDrawer();
  showToast("পণ্যটি কার্ট থেকে সরানো হয়েছে", "red");
}

function toggleCart() {
  document.getElementById("cart-drawer").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
  renderCartDrawer();
}
function closeCart() {
  document.getElementById("cart-drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function checkout() {
  const entries = Object.entries(cart).filter(([,q]) => q > 0);
  if (entries.length === 0) return;
  const subtotal = entries.reduce((s,[id,qty]) => {
    const p = products.find(x => x.id == id);
    return s + (p ? p.price * qty : 0);
  }, 0);
  const delivery = subtotal >= 2000 ? 0 : 60;
  const orderItems = entries.map(([id,qty]) => {
    const p = products.find(x => x.id == id);
    return {icon: p.icon, name: p.name, qty};
  });
  const now = new Date();
  orders.unshift({
    id: `ORD-${now.getFullYear()}-${String(orders.length+1).padStart(3,'0')}`,
    date: now.toLocaleDateString('bn-BD', {day:'numeric', month:'long', year:'numeric'}),
    status: "processing",
    items: orderItems,
    total: subtotal + delivery
  });
  cart = {};
  updateCartBadge();
  closeCart();
  showToast("🎉 অর্ডার সফলভাবে দেওয়া হয়েছে!", "green");
}

// ===== ORDERS PAGE =====
function renderOrders() {
  const statusMap = {
    delivered: {label:"ডেলিভারি সম্পন্ন", cls:"status-delivered"},
    processing: {label:"প্রক্রিয়াধীন", cls:"status-processing"},
    shipped: {label:"পাঠানো হয়েছে", cls:"status-shipped"},
    cancelled: {label:"বাতিল হয়েছে", cls:"status-cancelled"},
  };
  const el = document.getElementById("orders-list");
  if (orders.length === 0) {
    el.innerHTML = `<div class="no-orders"><span class="no-orders-icon">📭</span><p>কোনো অর্ডার নেই</p><small>দোকান থেকে পণ্য কিনুন</small></div>`;
    return;
  }
  el.innerHTML = orders.map((o,i) => {
    const st = statusMap[o.status] || statusMap.processing;
    return `<div class="order-card">
      <div class="order-header">
        <span class="order-id">${o.id}</span>
        <span class="order-date">📅 ${o.date}</span>
        <span class="order-status ${st.cls}">${st.label}</span>
      </div>
      <div class="order-items">
        ${o.items.map(it => `<div class="order-item-chip">${it.icon} ${it.name} ×${it.qty}</div>`).join("")}
      </div>
      <div class="order-footer">
        <span class="order-total">মোট: <span>৳${o.total.toLocaleString()}</span></span>
        <button class="reorder-btn" onclick="reorder(${i})">🔄 পুনরায় অর্ডার করুন</button>
      </div>
    </div>`;
  }).join("");
}

function reorder(idx) {
  const o = orders[idx];
  o.items.forEach(it => {
    const p = products.find(x => x.name === it.name);
    if (p) addToCart(p.id);
  });
  showToast("পণ্যগুলো কার্টে যোগ হয়েছে", "green");
}

// ===== ADMIN =====
function showAdminTab(tab) {
  adminTab = tab;
  document.querySelectorAll(".admin-nav-item").forEach(el => el.classList.remove("active"));
  const navEl = document.getElementById("anav-" + tab);
  if (navEl) navEl.classList.add("active");
  renderAdminContent();
}

function renderAdminContent() {
  const main = document.getElementById("admin-main");
  if (adminTab === "dashboard") {
    const totalRevenue = orders.reduce((s,o) => s + o.total, 0);
    const totalOrders = orders.length;
    const totalProducts = products.length;
    const pendingOrders = orders.filter(o => o.status === "processing").length;
    main.innerHTML = `
      <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;">📊 ড্যাশবোর্ড ওভারভিউ</h2>
      <div class="stats-grid">
        <div class="stat-card green">
          <div class="stat-icon">💰</div>
          <div class="stat-label">মোট রাজস্ব</div>
          <div class="stat-value">৳${totalRevenue.toLocaleString()}</div>
          <div class="stat-sub">সকল অর্ডার থেকে</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-icon">📦</div>
          <div class="stat-label">মোট অর্ডার</div>
          <div class="stat-value">${totalOrders}</div>
          <div class="stat-sub">${pendingOrders}টি প্রক্রিয়াধীন</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon">🛍️</div>
          <div class="stat-label">মোট পণ্য</div>
          <div class="stat-value">${totalProducts}</div>
          <div class="stat-sub">${getCategories().length - 1}টি ক্যাটাগরিতে</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon">🛒</div>
          <div class="stat-label">কার্টে আইটেম</div>
          <div class="stat-value">${Object.values(cart).reduce((s,i)=>s+i,0)}</div>
          <div class="stat-sub">এখন পর্যন্ত</div>
        </div>
      </div>
      <h3 class="admin-section-title">📋 সাম্প্রতিক অর্ডার</h3>
      <div class="orders-admin-table">
        <table>
          <thead><tr>
            <th>অর্ডার আইডি</th><th>তারিখ</th><th>পণ্য</th><th>মোট</th><th>স্ট্যাটাস</th>
          </tr></thead>
          <tbody>
            ${orders.slice(0,5).map(o => {
              const statusMap = {delivered:"status-delivered",processing:"status-processing",shipped:"status-shipped",cancelled:"status-cancelled"};
              const labelMap = {delivered:"সম্পন্ন",processing:"প্রক্রিয়াধীন",shipped:"পাঠানো হয়েছে",cancelled:"বাতিল"};
              return `<tr>
                <td style="color:var(--accent);font-weight:700">${o.id}</td>
                <td style="color:var(--text2)">${o.date}</td>
                <td>${o.items.map(it=>`${it.icon} ${it.name}`).join(", ")}</td>
                <td style="font-weight:700">৳${o.total.toLocaleString()}</td>
                <td><span class="order-status ${statusMap[o.status]||''}">${labelMap[o.status]||o.status}</span></td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    `;
  } else if (adminTab === "products") {
    main.innerHTML = `
      <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;">📦 পণ্য পরিচালনা</h2>
      <div class="add-product-card">
        <h3 class="admin-section-title" style="margin-bottom:16px">➕ নতুন পণ্য যোগ করুন</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">পণ্যের নাম</label>
            <input class="form-input" id="new-name" placeholder="যেমন: কটন শার্ট">
          </div>
          <div class="form-group">
            <label class="form-label">দাম (টাকা)</label>
            <input class="form-input" type="number" id="new-price" placeholder="যেমন: 850">
          </div>
          <div class="form-group">
            <label class="form-label">ক্যাটাগরি</label>
            <select class="form-select" id="new-cat">
              <option>পোশাক</option><option>ইলেকট্রনিক্স</option>
              <option>খাবার</option><option>গৃহস্থালি</option>
              <option>উপহার</option><option>অন্যান্য</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">স্টক পরিমাণ</label>
            <input class="form-input" type="number" id="new-stock" placeholder="যেমন: 20">
          </div>
          <div class="form-group">
            <label class="form-label">ইমোজি আইকন</label>
            <select class="form-select" id="new-icon">
              <option>👔</option><option>👗</option><option>👟</option><option>🧥</option>
              <option>📱</option><option>💻</option><option>🎧</option><option>⌚</option>
              <option>🍎</option><option>🍚</option><option>🍫</option><option>🍯</option>
              <option>🕯️</option><option>🧴</option><option>🛋️</option>
              <option>🎁</option><option>💐</option><option>🎈</option><option>📦</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">ব্যাজ (ঐচ্ছিক)</label>
            <select class="form-select" id="new-badge">
              <option value="">কোনোটি নয়</option>
              <option value="new">নতুন</option>
              <option value="hot">হট 🔥</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="adminAddProduct()">✓ পণ্য যোগ করুন</button>
          <button class="btn-secondary" onclick="clearForm()">✕ বাতিল করুন</button>
        </div>
      </div>
      <h3 class="admin-section-title">📋 সকল পণ্য (${products.length}টি)</h3>
      <div class="product-table">
        <table>
          <thead><tr>
            <th>আইকন</th><th>নাম</th><th>ক্যাটাগরি</th><th>দাম</th><th>স্টক</th><th>অ্যাকশন</th>
          </tr></thead>
          <tbody>
            ${products.map(p => `<tr>
              <td class="table-icon">${p.icon}</td>
              <td class="table-name">${p.name}</td>
              <td><span class="table-cat">${p.cat}</span></td>
              <td class="table-price">৳${p.price.toLocaleString()}</td>
              <td class="table-stock">${p.stock} পিস</td>
              <td><div class="table-actions">
                <button class="tbl-btn delete" onclick="deleteProduct(${p.id})">🗑️ মুছুন</button>
              </div></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    `;
  } else if (adminTab === "orders") {
    const statusMap = {
      delivered:{label:"সম্পন্ন",cls:"status-delivered"},
      processing:{label:"প্রক্রিয়াধীন",cls:"status-processing"},
      shipped:{label:"পাঠানো হয়েছে",cls:"status-shipped"},
      cancelled:{label:"বাতিল",cls:"status-cancelled"},
    };
    main.innerHTML = `
      <h2 style="font-size:20px;font-weight:700;margin-bottom:20px;">🛒 অর্ডার পরিচালনা</h2>
      <div class="orders-admin-table">
        <table>
          <thead><tr>
            <th>অর্ডার আইডি</th><th>তারিখ</th><th>পণ্য</th><th>মোট</th><th>স্ট্যাটাস পরিবর্তন করুন</th>
          </tr></thead>
          <tbody>
            ${orders.map((o,i) => {
              const st = statusMap[o.status] || statusMap.processing;
              return `<tr>
                <td style="color:var(--accent);font-weight:700">${o.id}</td>
                <td style="color:var(--text2)">${o.date}</td>
                <td>${o.items.map(it=>`${it.icon}${it.name}`).join(", ")}</td>
                <td style="font-weight:700">৳${o.total.toLocaleString()}</td>
                <td>
                  <select class="form-select" style="width:auto;padding:5px 10px;font-size:12px" onchange="updateOrderStatus(${i},this.value)">
                    <option value="processing" ${o.status==='processing'?'selected':''}>প্রক্রিয়াধীন</option>
                    <option value="shipped" ${o.status==='shipped'?'selected':''}>পাঠানো হয়েছে</option>
                    <option value="delivered" ${o.status==='delivered'?'selected':''}>সম্পন্ন</option>
                    <option value="cancelled" ${o.status==='cancelled'?'selected':''}>বাতিল</option>
                  </select>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    `;
  }
}

function adminAddProduct() {
  const name = document.getElementById("new-name").value.trim();
  const price = parseFloat(document.getElementById("new-price").value);
  const cat = document.getElementById("new-cat").value;
  const stock = parseInt(document.getElementById("new-stock").value) || 20;
  const icon = document.getElementById("new-icon").value;
  const badge = document.getElementById("new-badge").value;
  if (!name || !price) { showToast("পণ্যের নাম ও দাম দিন", "red"); return; }
  products.push({id: nextId++, name, price, cat, icon, stock, badge});
  renderCategoryList();
  filterProducts();
  renderAdminContent();
  showToast(`${icon} ${name} যোগ হয়েছে`, "green");
}

function clearForm() {
  ["new-name","new-price","new-stock"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });
}

function deleteProduct(id) {
  products = products.filter(p => p.id !== id);
  delete cart[id];
  updateCartBadge();
  renderCategoryList();
  filterProducts();
  renderAdminContent();
  showToast("পণ্যটি মুছে ফেলা হয়েছে", "red");
}

function updateOrderStatus(idx, status) {
  orders[idx].status = status;
  renderOrders();
  showToast("অর্ডারের স্ট্যাটাস আপডেট হয়েছে", "green");
}

// ===== PAGES =====
function showPage(page) {
  document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  document.getElementById("tab-" + page).classList.add("active");
  if (page === "orders") renderOrders();
  if (page === "admin") { adminTab = "dashboard"; renderAdminContent(); document.querySelectorAll(".admin-nav-item").forEach(el=>el.classList.remove("active")); document.getElementById("anav-dashboard").classList.add("active"); }
}

// ===== TOAST =====
let toastTimer;
function showToast(msg, type="green") {
  const t = document.getElementById("toast");
  const dot = document.getElementById("toast-dot");
  document.getElementById("toast-msg").textContent = msg;
  dot.className = "toast-dot" + (type==="red"?" red":type==="amber"?" amber":"");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}

// ===== INIT =====
renderCategoryList();
filterProducts();
</script>
</body>
</html>
